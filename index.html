<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 SNAKE GAME 🐍</h1>
        </div>

        <div class="game-wrapper">
            <div class="game-info">
                <div class="score-board">
                    <div class="info-item">
                        <label>Score</label>
                        <div id="score" class="value">0</div>
                    </div>
                    <div class="info-item">
                        <label>High Score</label>
                        <div id="highScore" class="value">0</div>
                    </div>
                    <div class="info-item">
                        <label>Difficulty</label>
                        <select id="difficulty" class="difficulty-select">
                            <option value="easy">Easy</option>
                            <option value="normal" selected>Normal</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                </div>

                <div class="game-board" id="gameBoard"></div>

                <div class="controls">
                    <button id="startBtn" class="btn btn-primary">START GAME</button>
                    <button id="pauseBtn" class="btn btn-secondary" disabled>PAUSE</button>
                </div>
            </div>
        </div>

        <div id="gameOverModal" class="modal hidden">
            <div class="modal-content">
                <h2>GAME OVER!</h2>
                <p id="finalScore" class="final-score"></p>
                <p id="newHighScore" class="high-score-msg hidden">🎉 NEW HIGH SCORE! 🎉</p>
                <button id="restartBtn" class="btn btn-primary">PLAY AGAIN</button>
            </div>
        </div>

        <div class="instructions">
            <h3>How to Play</h3>
            <ul>
                <li><strong>Arrow Keys</strong> or <strong>WASD</strong> to move the snake</li>
                <li>Eat the red food to grow and earn points</li>
                <li>Avoid hitting the walls or yourself</li>
                <li>The longer your snake, the higher your score!</li>
            </ul>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
